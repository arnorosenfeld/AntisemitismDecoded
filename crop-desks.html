<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Desk Crop Tool</title>
<style>
  body { font-family: -apple-system, sans-serif; background: #0f0f12; color: #e8e8ec; margin: 0; padding: 20px; }
  h1 { font-size: 16px; margin: 0 0 14px; }
  .instructions { font-size: 12px; color: #888; margin-bottom: 14px; line-height: 1.5; }
  .canvas-host { position: relative; display: inline-block; user-select: none; touch-action: none; cursor: crosshair; }
  .canvas-host img { display: block; max-width: 90vw; max-height: 75vh; }
  .crop-rect { position: absolute; border: 2px dashed #3b82f6; background: rgba(59,130,246,0.1); pointer-events: none; box-sizing: border-box; }
  .dim-overlay-top, .dim-overlay-bottom, .dim-overlay-left, .dim-overlay-right {
    position: absolute; background: rgba(0,0,0,0.55); pointer-events: none;
  }
  .output { margin-top: 16px; font-family: Menlo, monospace; font-size: 13px; background: #14141a; padding: 14px; border-radius: 4px; }
  button { background: #2563eb; color: white; border: 0; padding: 8px 16px; border-radius: 4px; cursor: pointer; font-size: 13px; margin-top: 10px; }
  button:hover { background: #1d4ed8; }
  input[type=file] { margin-bottom: 14px; }
</style>
</head>
<body>
<h1>Desk Crop Tool</h1>
<p class="instructions">Load one of the desk PNGs from <code>art/</code>, then click-drag to define the crop rectangle. The dimmed area will be removed. Copy the coordinates and paste them in chat.</p>
<input type="file" id="file-input" accept="image/png">
<div class="canvas-host" id="canvas-host" style="display:none">
  <img id="crop-img">
  <div class="dim-overlay-top" id="dim-top"></div>
  <div class="dim-overlay-bottom" id="dim-bottom"></div>
  <div class="dim-overlay-left" id="dim-left"></div>
  <div class="dim-overlay-right" id="dim-right"></div>
  <div class="crop-rect" id="crop-rect"></div>
</div>
<div class="output" id="output" style="display:none"></div>
<button id="copy-btn" style="display:none" onclick="copyOutput()">Copy to clipboard</button>

<script>
var cropState = null;
var drag = null;

document.getElementById('file-input').addEventListener('change', function(e) {
  var file = e.target.files[0];
  if (!file) return;
  var img = document.getElementById('crop-img');
  img.onload = function() {
    document.getElementById('canvas-host').style.display = 'inline-block';
    // Default crop: full image
    cropState = { x1: 0, y1: 0, x2: img.naturalWidth, y2: img.naturalHeight };
    renderCrop();
  };
  img.src = URL.createObjectURL(file);
});

function mouseToNatural(ev) {
  var img = document.getElementById('crop-img');
  var rect = img.getBoundingClientRect();
  return {
    x: Math.round(ev.clientX - rect.left) * img.naturalWidth / rect.width,
    y: Math.round(ev.clientY - rect.top) * img.naturalHeight / rect.height
  };
}

document.getElementById('canvas-host').addEventListener('pointerdown', function(ev) {
  var pos = mouseToNatural(ev);
  drag = { startX: pos.x, startY: pos.y };
  ev.preventDefault();
});

document.addEventListener('pointermove', function(ev) {
  if (!drag) return;
  var pos = mouseToNatural(ev);
  var img = document.getElementById('crop-img');
  cropState = {
    x1: Math.max(0, Math.min(drag.startX, pos.x)),
    y1: Math.max(0, Math.min(drag.startY, pos.y)),
    x2: Math.min(img.naturalWidth, Math.max(drag.startX, pos.x)),
    y2: Math.min(img.naturalHeight, Math.max(drag.startY, pos.y))
  };
  renderCrop();
});

document.addEventListener('pointerup', function() {
  drag = null;
});

function renderCrop() {
  if (!cropState) return;
  var img = document.getElementById('crop-img');
  var natW = img.naturalWidth, natH = img.naturalHeight;
  var dispW = img.clientWidth, dispH = img.clientHeight;
  var scaleX = dispW / natW, scaleY = dispH / natH;

  var x1 = cropState.x1 * scaleX, y1 = cropState.y1 * scaleY;
  var x2 = cropState.x2 * scaleX, y2 = cropState.y2 * scaleY;

  var rect = document.getElementById('crop-rect');
  rect.style.left = x1 + 'px'; rect.style.top = y1 + 'px';
  rect.style.width = (x2 - x1) + 'px'; rect.style.height = (y2 - y1) + 'px';

  // Dim overlays
  var dt = document.getElementById('dim-top');
  dt.style.left = '0'; dt.style.top = '0'; dt.style.width = dispW + 'px'; dt.style.height = y1 + 'px';
  var db = document.getElementById('dim-bottom');
  db.style.left = '0'; db.style.top = y2 + 'px'; db.style.width = dispW + 'px'; db.style.height = (dispH - y2) + 'px';
  var dl = document.getElementById('dim-left');
  dl.style.left = '0'; dl.style.top = y1 + 'px'; dl.style.width = x1 + 'px'; dl.style.height = (y2 - y1) + 'px';
  var dr = document.getElementById('dim-right');
  dr.style.left = x2 + 'px'; dr.style.top = y1 + 'px'; dr.style.width = (dispW - x2) + 'px'; dr.style.height = (y2 - y1) + 'px';

  // Output
  var cropW = Math.round(cropState.x2 - cropState.x1);
  var cropH = Math.round(cropState.y2 - cropState.y1);
  var out = document.getElementById('output');
  out.style.display = 'block';
  out.innerHTML =
    'Natural image: ' + natW + ' x ' + natH + '<br>' +
    'Crop box (pixels): x1=' + Math.round(cropState.x1) + ' y1=' + Math.round(cropState.y1) +
    ' x2=' + Math.round(cropState.x2) + ' y2=' + Math.round(cropState.y2) + '<br>' +
    'Crop size: ' + cropW + ' x ' + cropH + '<br>' +
    'Removed: top=' + Math.round(cropState.y1) + 'px (' + (cropState.y1/natH*100).toFixed(1) + '%)' +
    '  bottom=' + Math.round(natH - cropState.y2) + 'px (' + ((natH-cropState.y2)/natH*100).toFixed(1) + '%)' +
    '  left=' + Math.round(cropState.x1) + 'px (' + (cropState.x1/natW*100).toFixed(1) + '%)' +
    '  right=' + Math.round(natW - cropState.x2) + 'px (' + ((natW-cropState.x2)/natW*100).toFixed(1) + '%)';
  document.getElementById('copy-btn').style.display = 'inline-block';
}

function copyOutput() {
  var text = 'CROP: x1=' + Math.round(cropState.x1) + ' y1=' + Math.round(cropState.y1) +
    ' x2=' + Math.round(cropState.x2) + ' y2=' + Math.round(cropState.y2);
  navigator.clipboard.writeText(text);
}
</script>
</body>
</html>
